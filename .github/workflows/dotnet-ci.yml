name: .NET CI - Build and Test
on:
  push:
    branches:
      - "main"
      - "develop"
  pull_request: 
    branches:
      - "main"
      - "develop"
env: 
  DOTNET_VER: '9.0.x'
jobs:
  build-and-test:
    runs-on: windows-latest   
    steps:
      - name: Clean bin and obj folders
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Include bin,obj -Recurse -Directory | ForEach-Object {
            Write-Host "Removing $($_.FullName)"
            Remove-Item -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
          }
      # Шаг 1: Получить код из репозитория
      - name: Checkout Repo
        uses: actions/checkout@v4 # Это checkout -- это actions самого GitHub
                                  # все actions хранятся в одноименной директории
      - name: Clean bin and obj folders
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Include bin,obj -Recurse -Directory | ForEach-Object {
            Write-Host "Removing $($_.FullName)"
            Remove-Item -Path $_.FullName -Recurse -Force -ErrorAction SilentlyContinue
          }
      # Шаг 2: Установить .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: ${{env.DOTNET_VER}} # Тут используем переменную
      
      # Шаг 3: Восстановить все зависимости
      - name: Restore deps
        run: dotnet restore # Это уже не готовый actions
                            # Поэтому пишем вызываемую команду
          
      # Шаг 4: Собираем проект
      - name: Build Solution
        run: dotnet build --no-restore --configuration Release
        
      # Шаг 5: Выполняем модульное тестирование  
      - name: Run unit tests
        run: dotnet test --configuration Release



